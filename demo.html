<!DOCTYPE html>
<html lang="en" ng-app="uniApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakistan Universities</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #003366;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .cards-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

.card{
    background:white;
    width:300px;
    min-height:300px;
    padding:15px;
    border-radius:10px;
    box-shadow:0px 2px 8px rgba(0,0,0,.1);
    text-align:center;
}

.card img{
    width:100%;
    height:150px;
    object-fit:contain;
    border-radius:8px;
}

        .name {
            font-size: 20px;
            font-weight: bold;
            color: #003366;
            margin-top: 10px;
        }

        .btns {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>

</head>

<body ng-controller="uniCtrl">

    <div class="container">

        <h1>Pakistan Universities</h1>

        <input
            type="text"
            ng-model="searchText"
            placeholder="Search University Name">

        <div class="cards-container">

    <div class="card" ng-repeat="uni in paginatedList">

        <img ng-src="{{uni.image}}" alt="{{uni.name}}">

        <div class="name">
            {{uni.name}}
        </div>

        <p>📞 {{uni.phone}}</p>

        <p>
            <a ng-href="{{uni.website}}" target="_blank">
                Open Website
            </a>
        </p>

    </div>

</div>

        <div class="btns">

            <button
                ng-click="prevPage()"
                ng-disabled="currentPage==1">
                Previous
            </button>

            <button
                ng-click="nextPage()"
                ng-disabled="currentPage==totalPages()">
                Next
            </button>

        </div>

        <h3 style="text-align:center">
            Page {{currentPage}} of {{totalPages()}}
        </h3>

    </div>

</body>
</html>
